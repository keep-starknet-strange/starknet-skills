rules:
  - id: cairo.immediate-upgrade-without-timelock
    message: "Immediate upgrade path without schedule/execute split."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.cairo"
    patterns:
      - pattern-regex: "(replace_class_syscall\\(|upgradeable\\.upgrade\\()"
      - pattern-not-regex: "(schedule|scheduled|delay|timelock)"

  - id: cairo.upgrade-class-hash-no-nonzero-guard
    message: "Upgrade path uses new_class_hash without explicit non-zero guard."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.cairo"
    patterns:
      - pattern-regex: "new_class_hash"
      - pattern-regex: "(replace_class_syscall\\(|upgradeable\\.upgrade\\()"
      - pattern-not-regex: "(is_non_zero\\(|!=\\s*0)"

  - id: cairo.critical-address-init-no-guard
    message: "Constructor seeds privileged/dependency ContractAddress without non-zero guard."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.cairo"
    patterns:
      - pattern-regex: "constructor\\s*\\([^)]*(owner|admin|governor|upgrade|manager|oracle|vault)[^)]*:\\s*ContractAddress"
      - pattern-regex: "\\.write\\("
      - pattern-not-regex: "is_non_zero\\("

  - id: cairo.no-access-control-mutation
    message: "External mutation path appears without explicit access gate."
    severity: WARNING
    languages: [generic]
    metadata:
      confidence: low
      triage: "manual-review-required"
    paths:
      include:
        - "**/*.cairo"
    patterns:
      - pattern-regex: "#\\[external\\(v0\\)\\]"
      - pattern-regex: "fn\\s+(set_|update_|register_|pause|unpause|upgrade)"
      - pattern-regex: "\\.write\\("
      - pattern-not-regex: "(assert_only_|assert\\(get_caller_address\\(|has_role\\()"

  - id: cairo.fees-recipient-zero-dos
    message: "fees_recipient write appears without non-zero validation."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.cairo"
    patterns:
      - pattern-regex: "\\.write\\(\\s*fees_recipient\\s*\\)"
      - pattern-not-regex: "(fees_recipient\\.is_non_zero\\(|fees_recipient\\s*!=\\s*0)"

  - id: cairo.unchecked-fee-bound
    message: "Fee/rate parameter appears to be written without explicit max bound."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.cairo"
    patterns:
      - pattern-regex: "(fee|bps|rate)\\s*:\\s*(u16|u32|u64|u128|u256|felt252)"
      - pattern-regex: "\\.write\\([^)]*(fee|bps|rate)"
      - pattern-not-regex: "(<=\\s*MAX_|>=\\s*MIN_|is_le\\()"

  - id: cairo.erc1155-cei-risk
    message: "Potential ERC1155 CEI ordering risk (triage hint, verify ordering manually)."
    severity: WARNING
    languages: [generic]
    metadata:
      confidence: low
      triage: "manual-ordering-review-required"
    paths:
      include:
        - "**/*.cairo"
    patterns:
      - pattern-regex: "safe_transfer_from\\([\\s\\S]{0,360}(order_status|state|fulfilled|claimed|\\.write\\()"
      - pattern-not-regex: "(order_status|state|fulfilled|claimed|\\.write\\()[\\s\\S]{0,240}safe_transfer_from\\("

  - id: cairo.irrevocable-admin
    message: "Constructor seeds owner/admin but no obvious rotation path is present."
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.cairo"
    patterns:
      - pattern-regex: "constructor\\s*\\([^)]*(owner|admin|governor|upgrade)[^)]*:\\s*ContractAddress"
      - pattern-not-regex: "(transfer_ownership|renounce_ownership|set_admin|change_admin|rotate_admin|grant_role|revoke_role)"
